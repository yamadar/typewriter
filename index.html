<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR MAIL Typewriter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="machine">
    <div class="deck">
      <div class="carriage" id="carriage">
        <button class="lever-btn" id="leverCR" aria-label="キャリッジリターン (CR)"><span class="lever-arm"></span><span class="lever-pivot"></span></button>
        <div class="paper-frame"><canvas id="paper"></canvas></div>
        <button class="release-btn" id="paperRelease" aria-pressed="false" aria-label="用紙解放レバー（紙を取り出す）"><span class="release-arm"></span><span class="release-pivot"></span></button>
      </div>
    </div>

    <div class="lid">
      <canvas id="lid" aria-hidden="true"></canvas>
      <!-- 左：行間スイッチ（上から 1.0 / 1.5 / 2.0）。LFの行送り量が変わる -->
      <div class="lh-switch left" id="lineSwitch" role="group" aria-label="行間 line spacing">
        <span class="lh-knob" aria-hidden="true"></span>
        <button class="lh num" type="button" data-lh="1"   title="行間 Single 1.0">1</button>
        <button class="lh num" type="button" data-lh="1.5" title="行間 1.5">1½</button>
        <button class="lh num" type="button" data-lh="2"   title="行間 Double 2.0">2</button>
      </div>
      <!-- 右：リボン色スイッチ（上から 青インク / 黒 / 赤インク）。打鍵の色が変わる -->
      <div class="lh-switch" id="ribbonSwitch" role="group" aria-label="リボン色 ribbon colour">
        <span class="lh-knob" aria-hidden="true"></span>
        <button class="lh ink-blue"  type="button" data-ink="blue"  title="青インク" aria-label="青インク"></button>
        <button class="lh ink-black" type="button" data-ink="black" title="黒インク" aria-label="黒インク"></button>
        <button class="lh ink-red"   type="button" data-ink="red"   title="赤インク" aria-label="赤インク"></button>
      </div>
    </div>

    <div class="cover">
      <div class="logo"><span>✈ </span>AIR MAIL</div>
      <div class="keyboard" id="keyboard"></div>
    </div>
  </div>

  <div class="strip">
    <div class="keys">
      <kbd>Enter</kbd>CR+LF&nbsp; <kbd>Shift+Enter</kbd>CR&nbsp; <kbd>Ctrl+Enter</kbd>LF&nbsp; <kbd>Backspace</kbd>後退（重ね打ち）&nbsp; <kbd>Esc</kbd>用紙解放
    </div>
    <div class="status" id="status">行 1 · 桁 1 <span class="bell-dot" id="belldot"></span></div>
  </div>

  <!-- 用紙解放時：印字された紙を画面中央に提示（長い紙はスクロール）。クリック/Escで戻る -->
  <div id="sheetView" class="hide" aria-hidden="true"></div>

  <div class="overlay" id="overlay"><div><b>AIR MAIL</b>クリックして開始（音 ON・キー入力受付）</div></div>

<script src="typewriter-model.js"></script>
<script src="script.js"></script>
</body>
</html>
