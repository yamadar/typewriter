<svg viewBox="0 0 640 440" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,'Hiragino Sans','Yu Gothic',sans-serif">
  <rect width="640" height="440" fill="#faf7ef"/>
  <text x="320" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#2b2a26">セグメントと共通打点（印字点 P）</text>

  <!-- platen / ribbon line -->
  <line x1="170" y1="86" x2="470" y2="86" stroke="#c0392b" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="478" y="90" font-size="11" fill="#9a8f7e">プラテン面／リボン</text>

  <!-- type guide fork -->
  <line x1="311" y1="92" x2="311" y2="112" stroke="#6b6658" stroke-width="2"/>
  <line x1="329" y1="92" x2="329" y2="112" stroke="#6b6658" stroke-width="2"/>
  <text x="338" y="108" font-size="11" fill="#6b6658">タイプガイド</text>

  <!-- typebars converging to P(320,86); pivots lie on M80,360 Q320,272 560,360 -->
  <g stroke="#bcb6a6" stroke-width="2">
    <line x1="80"  y1="360"   x2="320" y2="86"/>
    <line x1="128" y1="344.2" x2="320" y2="86"/>
    <line x1="176" y1="331.8" x2="320" y2="86"/>
    <line x1="272" y1="317.8" x2="320" y2="86"/>
    <line x1="320" y1="316"   x2="320" y2="86"/>
    <line x1="368" y1="317.8" x2="320" y2="86"/>
    <line x1="416" y1="323"   x2="320" y2="86"/>
    <line x1="464" y1="331.8" x2="320" y2="86"/>
    <line x1="512" y1="344.2" x2="320" y2="86"/>
    <line x1="560" y1="360"   x2="320" y2="86"/>
  </g>
  <!-- active typebar (224,323) -->
  <line x1="224" y1="323" x2="320" y2="86" stroke="#2b2a26" stroke-width="3.5"/>
  <text x="120" y="250" font-size="11" fill="#2b2a26">振り上げ中の</text>
  <text x="120" y="265" font-size="11" fill="#2b2a26">タイプバー</text>

  <!-- segment arc -->
  <path d="M80,360 Q320,272 560,360" fill="none" stroke="#8f948c" stroke-width="6" stroke-linecap="round"/>

  <!-- pivot dots -->
  <g fill="#5c574b">
    <circle cx="80"  cy="360"   r="4"/>
    <circle cx="128" cy="344.2" r="4"/>
    <circle cx="176" cy="331.8" r="4"/>
    <circle cx="224" cy="323"   r="4"/>
    <circle cx="272" cy="317.8" r="4"/>
    <circle cx="320" cy="316"   r="4"/>
    <circle cx="368" cy="317.8" r="4"/>
    <circle cx="416" cy="323"   r="4"/>
    <circle cx="464" cy="331.8" r="4"/>
    <circle cx="512" cy="344.2" r="4"/>
    <circle cx="560" cy="360"   r="4"/>
  </g>

  <!-- printing point -->
  <circle cx="320" cy="86" r="7" fill="#c0392b" stroke="#fff" stroke-width="1.5"/>
  <text x="320" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b">印字点 P（空間に固定・1点）</text>

  <!-- segment labels -->
  <text x="320" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#2b2a26">セグメント（円弧スロット）＝各タイプバーの枢軸が並ぶ</text>
  <text x="320" y="421" text-anchor="middle" font-size="12" fill="#6b6658">どのキーを打っても活字は必ず同一点 P に到達する</text>
</svg>
